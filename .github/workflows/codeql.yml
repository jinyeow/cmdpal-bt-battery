name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: windows-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: manual

      - name: Build Extension
        run: dotnet build src/BtBattery.Extension/BtBattery.Extension.csproj -c Debug -p:Platform=x64

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"
