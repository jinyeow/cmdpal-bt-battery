name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64, ARM64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Build Extension (${{ matrix.platform }})
        run: dotnet build src/BtBattery.Extension/BtBattery.Extension.csproj -c Debug -p:Platform=${{ matrix.platform }}

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Run tests
        run: dotnet test tests/BtBattery.Tests/ -p:Platform=x64
