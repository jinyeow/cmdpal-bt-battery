name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64, ARM64]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Build Extension (${{ matrix.platform }})
        run: dotnet build src/BtBattery.Extension/BtBattery.Extension.csproj -c Debug -p:Platform=${{ matrix.platform }}

  test:
    runs-on: windows-latest
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Run tests
        run: dotnet test tests/BtBattery.Tests/ -p:Platform=x64 --logger trx --results-directory TestResults

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: xUnit Tests
          path: TestResults/*.trx
          reporter: dotnet-trx
